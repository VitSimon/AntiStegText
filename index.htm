<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test</title>
<script src="antisteg.js"></script>
<style>
.converted {
  white-space: pre-wrap;
  border: 1px black;
  border-style: solid;
}
</style>
</head>
<body>
<h1>antisteg helper test</h1>
<strong>Input:</strong><textarea rows="5" style="width: 99%" id="inval">Test(​)Te(‌)xt(‍)🧑‍🤝‍🧑📖🔎🏡🌐🎨📚✏️↔🔲📽🌈❌︎</textarea><br>
<input type="checkbox" checked="false" id="keepCol"> Keep icon colors<br>
<input type="checkbox" checked="true" id="keepIconJoin"> Keep icon joiner<br>
<button type="button" id="snd">Convert</button><br><br>
<strong>Text:</strong><div class="converted" id="converted">...</div><br>
<strong>Char values:</strong><div class="converted" id="converted2">...</div><br>
<script>
const $ = (name) => document.getElementById(name);
$("snd").addEventListener("click", (event) => {
  const conv = $("converted");
  conv.innerHTML = toFilteredUTFText($("inval").value, $("keepCol").checked, $("keepIconJoin").checked);
  const conv2 = $("converted2");
  conv2.innerHTML = '';
  for (const ch of conv.innerHTML) {
    const cp = ch.codePointAt(0);
    conv2.innerHTML += `(${ch}|${cp.toString()})`;    
  }
})
</script>
</body>
</html>
